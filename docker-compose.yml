services:
  predictive-maintenance-api:
    build: .
    container_name: predictive-maintenance-api
    ports:
      - "8010:8010"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
